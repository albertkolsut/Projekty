{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NRG Team{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'styles/styles.css' %}">
</head>
<body>
    <!-- Nagłówek strony (wspólny dla wszystkich podstron) -->
    <header class="navbar">
        <div class="left-section">
            <div class="logo">
                <img src="{% static 'images/logo.jpg' %}" alt="Logo" height="60">
            </div>
            <nav class="nav-buttons">
                <a href="{% url 'index' %}" class="btn">Strona Główna</a>
                <a href="{% url 'aktualnosci' %}" class="btn">Aktualności</a>
                <a href="{% url 'bilety' %}" class="btn">Bilety</a>
                <div class="dropdown">
                    <button class="dropbtn {% if request.resolver_match.url_name == 'sklep' or request.resolver_match.url_name == 'merch' %}active{% endif %}">Sklep</button>
                    <div class="dropdown-content">
                        <a href="{% url 'sklep' %}">Bilety</a>
                        <a href="{% url 'merch' %}">Gadżety</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Statystyki</button>
                    <div class="dropdown-content">
                        <a href="{% url 'terminarz' %}">Terminarz</a>
                        <a href="{% url 'tabela' %}">Tabela</a>
                        <a href="{% url 'statystyki' %}">Statystyki zawodników</a>
                    </div>
                </div>
            </nav>
        </div>
        <div class="right-section">
            <a href="{% url 'login' %}" class="btn login-btn">Zaloguj</a>
        </div>
    </header>

    <!-- Główna zawartość strony (będzie różna dla każdej podstrony) -->
    <main class="container">
        {% block content %}
        <!-- Tutaj trafi zawartość z szablonów dziedziczących -->
        {% endblock %}
    </main>

    <!-- Stopka (opcjonalna) -->
    <footer>
        <!-- ... -->
    </footer>
</body>
</html>
