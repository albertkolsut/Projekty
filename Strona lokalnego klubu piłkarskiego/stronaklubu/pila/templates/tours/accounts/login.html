{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | NRG Team</title>
    <link rel="stylesheet" href="{% static 'styles/styles.css' %}">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="left-section">
            <div class="logo">
                <img src="{% static 'images/logo.jpg' %}" alt="Logo" height="60">
            </div>
            <nav class="nav-buttons">
                <a href="{% url 'index' %}" class="btn">Strona Główna</a>
                <a href="{% url 'aktualnosci' %}" class="btn">Aktualności</a>
                <a href="{% url 'bilety' %}" class="btn">Bilety</a>
                <a href="{% url 'sklep' %}" class="btn">Sklep</a>
                <a href="{% url 'statystyki' %}" class="btn">Statystyki</a>
            </nav>
        </div>
        <div class="right-section">
            <a href="{% url 'login' %}" class="btn login-btn">Zaloguj</a>
        </div>
    </header>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-box">
            <h2>Zaloguj się</h2>
            <form method="post" action="#">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="form-group">
                    <label for="username">Nazwa użytkownika</label>
                    <input type="text" name="username" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit">Zaloguj</button>
            </form>
            {% if error %}
                <p class="error">Niepoprawne dane logowania</p>
            {% endif %}
            <p>Nie masz konta? <a href="{% url 'register' %}">Zarejestruj się</a></p>
        </div>
    </div>

</body>
</html>
